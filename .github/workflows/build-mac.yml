name: Build Mac

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Job 1 : Apple Silicon arm64 (runner natif ARM) ─────────────────
  build-arm64:
    name: Build Mac arm64 (Apple Silicon M1/M2/M3)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configurer package.json cabinet
        run: |
          node -e "
            const fs=require('fs');
            const p=JSON.parse(fs.readFileSync('package.json','utf8'));
            p.version='${{ github.ref_name }}'.replace('v','') || p.version;
            p.build.appId='com.synoria.cabinet';
            p.build.productName='Synoria';
            fs.writeFileSync('package.json',JSON.stringify(p,null,2),'utf8');
            console.log('OK',p.version,'com.synoria.cabinet');
          "

      - name: npm install (arm64 natif)
        run: npm install
        # Sur macos-latest (ARM), npm installe better-sqlite3 arm64 ✓

      - name: Build arm64
        run: npx vite build && npx electron-builder --mac --arm64 --publish never

      - name: Upload DMG arm64
        uses: actions/upload-artifact@v4
        with:
          name: dmg-arm64
          path: release/Synoria*.dmg
          retention-days: 1

  # ── Job 2 : Intel x64 (npm install forcé en x64) ───────────────────
  build-x64:
    name: Build Mac x64 (Intel 2019 et avant)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configurer package.json cabinet
        run: |
          node -e "
            const fs=require('fs');
            const p=JSON.parse(fs.readFileSync('package.json','utf8'));
            p.version='${{ github.ref_name }}'.replace('v','') || p.version;
            p.build.appId='com.synoria.cabinet';
            p.build.productName='Synoria';
            fs.writeFileSync('package.json',JSON.stringify(p,null,2),'utf8');
            console.log('OK',p.version,'com.synoria.cabinet');
          "

      - name: npm install (x64 forcé — télécharge better-sqlite3 x64)
        run: npm install
        env:
          npm_config_arch: x64           # Force le téléchargement du binaire x64
          npm_config_target_arch: x64

      - name: Build x64
        run: npx vite build && npx electron-builder --mac --x64 --publish never
        env:
          npm_config_arch: x64

      - name: Upload DMG x64
        uses: actions/upload-artifact@v4
        with:
          name: dmg-x64
          path: release/Synoria*.dmg
          retention-days: 1

  # ── Job 3 : Release GitHub avec les 2 DMG ──────────────────────────
  release:
    name: Publier GitHub Release
    needs: [build-arm64, build-x64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Télécharger DMG arm64
        uses: actions/download-artifact@v4
        with:
          name: dmg-arm64
          path: release

      - name: Télécharger DMG x64
        uses: actions/download-artifact@v4
        with:
          name: dmg-x64
          path: release

      - name: Renommer les DMG
        run: |
          VERSION="${{ github.ref_name }}"
          ls -la release/
          for f in release/*.dmg; do
            echo "Fichier trouvé : $f"
          done
          # Renommer selon l'architecture
          arm=$(ls release/Synoria*.dmg 2>/dev/null | head -1)
          x64=$(ls release/Synoria*.dmg 2>/dev/null | tail -1)
          if [ "$arm" = "$x64" ]; then
            # Un seul fichier — quelque chose a mal tourné
            echo "ATTENTION : un seul DMG trouvé"
          fi

      - name: Publier Release
        uses: softprops/action-gh-release@v2
        with:
          name: Synoria ${{ github.ref_name }}
          body: |
            ## Synoria ${{ github.ref_name }} — macOS

            | Fichier | Compatible |
            |---------|-----------|
            | `*-arm64.dmg` | **Apple Silicon M1/M2/M3** — MacBook depuis fin 2020 |
            | `*-x64.dmg`   | **Intel** — MacBook avant fin 2020 |

            > **Pomme → À propos de ce Mac** :
            > - "Apple M..." → **arm64**
            > - "Intel Core..." → **x64**
          files: release/*.dmg
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
