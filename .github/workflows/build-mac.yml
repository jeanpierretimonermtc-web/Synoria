name: Build Mac

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Job 1 : Apple Silicon arm64 (runner natif ARM) ─────────────────
  build-arm64:
    name: Build Mac arm64 (Apple Silicon M1/M2/M3)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configurer package.json cabinet
        run: |
          node -e "
            const fs=require('fs');
            const p=JSON.parse(fs.readFileSync('package.json','utf8'));
            p.version='${{ github.ref_name }}'.replace('v','') || p.version;
            p.build.appId='com.synoria.cabinet';
            p.build.productName='Synoria';
            fs.writeFileSync('package.json',JSON.stringify(p,null,2),'utf8');
            console.log('OK',p.version,'com.synoria.cabinet');
          "

      - name: npm install (arm64 natif)
        run: npm install

      - name: Build arm64
        run: npx vite build && npx electron-builder --mac --arm64 --publish never

      - name: Garantir suffixe -arm64 dans le nom du DMG
        run: |
          cd release
          for f in *.dmg; do
            if [[ "$f" != *"-arm64.dmg" ]]; then
              mv "$f" "${f%.dmg}-arm64.dmg"
              echo "Renommé : $f → ${f%.dmg}-arm64.dmg"
            else
              echo "Déjà correct : $f"
            fi
          done
          ls -lh *.dmg

      - name: Publier DMG arm64 sur GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Synoria ${{ github.ref_name }}
          body: |
            ## Synoria ${{ github.ref_name }} — macOS

            | Fichier | Compatible |
            |---------|-----------|
            | `*-arm64.dmg` | **Apple Silicon M1/M2/M3** — MacBook depuis fin 2020 |
            | `*-x64.dmg`   | **Intel Core** — MacBook avant fin 2020 |

            > **Pomme → À propos de ce Mac** :
            > - "Apple M..." → télécharger **arm64**
            > - "Intel Core..." → télécharger **x64**
          files: release/Synoria*-arm64.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Job 2 : Intel x64 (runner Intel natif macos-13) ────────────────
  build-x64:
    name: Build Mac x64 (Intel — MacBook avant fin 2020)
    runs-on: macos-13        # ← Runner Intel x86_64 natif — aucune cross-compilation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configurer package.json cabinet
        run: |
          node -e "
            const fs=require('fs');
            const p=JSON.parse(fs.readFileSync('package.json','utf8'));
            p.version='${{ github.ref_name }}'.replace('v','') || p.version;
            p.build.appId='com.synoria.cabinet';
            p.build.productName='Synoria';
            fs.writeFileSync('package.json',JSON.stringify(p,null,2),'utf8');
            console.log('OK',p.version,'com.synoria.cabinet');
          "

      - name: npm install (Intel natif — better-sqlite3 x64 automatique)
        run: npm install
        # Sur macos-13 (Intel), npm install + postinstall electron-rebuild → x64 natif ✓

      - name: Build x64
        run: npx vite build && npx electron-builder --mac --x64 --publish never

      - name: Garantir suffixe -x64 dans le nom du DMG
        run: |
          cd release
          for f in *.dmg; do
            if [[ "$f" != *"-x64.dmg" ]]; then
              mv "$f" "${f%.dmg}-x64.dmg"
              echo "Renommé : $f → ${f%.dmg}-x64.dmg"
            else
              echo "Déjà correct : $f"
            fi
          done
          ls -lh *.dmg

      - name: Publier DMG x64 sur GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Synoria ${{ github.ref_name }}
          body: |
            ## Synoria ${{ github.ref_name }} — macOS

            | Fichier | Compatible |
            |---------|-----------|
            | `*-arm64.dmg` | **Apple Silicon M1/M2/M3** — MacBook depuis fin 2020 |
            | `*-x64.dmg`   | **Intel Core** — MacBook avant fin 2020 |

            > **Pomme → À propos de ce Mac** :
            > - "Apple M..." → télécharger **arm64**
            > - "Intel Core..." → télécharger **x64**
          files: release/Synoria*-x64.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
