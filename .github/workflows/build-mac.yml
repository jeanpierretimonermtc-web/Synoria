name: Build Mac

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    name: Build Mac (arm64 + x64)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm install

      - name: Configurer package.json cabinet
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            if ('$VERSION') pkg.version = '$VERSION';
            pkg.build.appId = 'com.synoria.cabinet';
            pkg.build.productName = 'Synoria';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2), 'utf8');
            console.log('OK - ' + pkg.version + ' / com.synoria.cabinet / Synoria');
          "

      # ── Build arm64 (natif sur ce runner ARM) ───────────────────────
      # npm install a déjà compilé better-sqlite3 pour arm64 → correct
      - name: Build Mac arm64 (Apple Silicon M1/M2/M3)
        run: npx vite build && npx electron-builder --mac --arm64 --publish never

      - name: Renommer DMG arm64
        run: |
          DMG=$(ls release/*.dmg 2>/dev/null | head -1)
          [ -n "$DMG" ] && mv "$DMG" "release/Synoria-${{ github.ref_name }}-arm64.dmg" || (echo "Pas de DMG arm64" && exit 1)
          echo "✓ arm64: release/Synoria-${{ github.ref_name }}-arm64.dmg"

      # ── Rebuild better-sqlite3 pour x64 AVANT le build Intel ────────
      # Sans ce step, better-sqlite3.node reste arm64 → crash sur Intel
      - name: Rebuild better-sqlite3 pour x64
        run: npx electron-rebuild --force --arch x64 -w better-sqlite3
        env:
          npm_config_arch: x64

      # ── Build x64 (Intel) avec better-sqlite3 x64 ───────────────────
      - name: Build Mac x64 (Intel 2019 et avant)
        run: npx electron-builder --mac --x64 --publish never

      - name: Renommer DMG x64
        run: |
          DMG=$(ls release/*.dmg 2>/dev/null | grep -v arm64 | head -1)
          [ -n "$DMG" ] && mv "$DMG" "release/Synoria-${{ github.ref_name }}-x64.dmg" || (echo "Pas de DMG x64" && exit 1)
          echo "✓ x64: release/Synoria-${{ github.ref_name }}-x64.dmg"

      - name: Vérification finale
        run: |
          echo "=== DMG produits ==="
          ls -lh release/*.dmg
          echo "=== Architecture better-sqlite3 dans arm64 ==="
          hdiutil attach "release/Synoria-${{ github.ref_name }}-arm64.dmg" -mountpoint /tmp/synoria-arm64 -quiet 2>/dev/null || true
          file "/tmp/synoria-arm64/Synoria.app/Contents/Resources/app.asar.unpacked/node_modules/better-sqlite3/build/Release/better_sqlite3.node" 2>/dev/null || echo "Impossible de monter le DMG arm64"
          hdiutil detach /tmp/synoria-arm64 -quiet 2>/dev/null || true

      - name: Publier vers GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Synoria ${{ github.ref_name }}
          body: |
            ## Synoria ${{ github.ref_name }} — macOS

            | Fichier | Pour quel Mac |
            |---------|--------------|
            | `*-arm64.dmg` | **Apple Silicon M1/M2/M3** — MacBook depuis fin 2020 |
            | `*-x64.dmg`   | **Intel** — MacBook avant fin 2020 |

            > **Comment savoir ?**  → Pomme → À propos de ce Mac
            > - "Apple M1/M2/M3" → **arm64**
            > - "Intel Core..." → **x64**

            > Premier lancement : clic droit → Ouvrir → Ouvrir quand même
          files: |
            release/Synoria-${{ github.ref_name }}-arm64.dmg
            release/Synoria-${{ github.ref_name }}-x64.dmg
          overwrite: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
