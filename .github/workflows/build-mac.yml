name: Build Mac

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Job 1 : Apple Silicon arm64 ────────────────────────────────────
  build-arm64:
    name: Build Mac arm64 (Apple Silicon M1/M2/M3)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configurer package.json (cabinet, version)
        run: |
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const ref = '${{ github.ref_name }}';
            const m = ref.match(/^v?(\d+\.\d+\.\d+)/);
            if (m) p.version = m[1];
            p.build.appId = 'com.synoria.cabinet';
            p.build.productName = 'Synoria';
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2), 'utf8');
            console.log('OK', p.version, 'com.synoria.cabinet');
          "

      - name: npm install (arm64 natif)
        run: npm install

      - name: Créer .env.local depuis les secrets
        env:
          LICENSE_PUBLIC_KEY: ${{ secrets.LICENSE_PUBLIC_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GCAL_CLIENT_ID: ${{ secrets.GCAL_CLIENT_ID }}
          GCAL_CLIENT_SECRET: ${{ secrets.GCAL_CLIENT_SECRET }}
          OWNER_EMAILS: ${{ secrets.OWNER_EMAILS }}
        run: |
          node -e "
            const fs = require('fs');
            const keys = ['LICENSE_PUBLIC_KEY','SUPABASE_URL','SUPABASE_ANON_KEY','GCAL_CLIENT_ID','GCAL_CLIENT_SECRET','OWNER_EMAILS'];
            const lines = keys.map(k => {
              const v = (process.env[k] || '').replace(/\"/g, '\\\\\"').replace(/\r\n/g, '\\\\n').replace(/\n/g, '\\\\n');
              return k + '=\"' + v + '\"';
            });
            fs.writeFileSync('.env.local', lines.join('\n') + '\n');
            console.log('Créé .env.local avec', keys.length, 'variables');
          "

      - name: Nettoyer les anciens DMG
        run: rm -f release/*.dmg release/*.zip || true

      - name: Build DMG arm64
        run: npx vite build && npx electron-builder --mac --arm64 --publish never

      - name: Vérifier architecture du binaire natif
        run: |
          NODE_FILE=$(find node_modules/better-sqlite3 -name "*.node" | head -1)
          echo "Binaire : $NODE_FILE"
          file "$NODE_FILE"

      - name: Garantir suffixe -arm64.dmg
        run: |
          cd release
          for f in *.dmg; do
            [[ "$f" == *"-arm64.dmg" ]] && echo "OK : $f" && continue
            mv "$f" "${f%.dmg}-arm64.dmg"
            echo "Renommé → ${f%.dmg}-arm64.dmg"
          done
          ls -lh *.dmg

      - name: Publier sur GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Synoria ${{ github.ref_name }}
          body: |
            ## Synoria ${{ github.ref_name }} — macOS

            | Fichier | Compatible avec |
            |---------|----------------|
            | `*-arm64.dmg` | **Apple Silicon** M1 / M2 / M3 — MacBook depuis fin 2020 |
            | `*-x64.dmg`   | **Intel Core** — MacBook avant fin 2020 |

            > **Comment savoir ?** Pomme  → À propos de ce Mac
            > - "Apple M..." → télécharger **arm64**
            > - "Intel Core..." → télécharger **x64**
          files: release/Synoria*-arm64.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Job 2 : Intel x64 — CFLAGS cross-compilation clang ────────────
  build-x64:
    name: Build Mac x64 (Intel — CFLAGS x86_64)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configurer package.json (cabinet, version)
        run: |
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const ref = '${{ github.ref_name }}';
            const m = ref.match(/^v?(\d+\.\d+\.\d+)/);
            if (m) p.version = m[1];
            p.build.appId = 'com.synoria.cabinet';
            p.build.productName = 'Synoria';
            p.build.npmRebuild = false;
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2), 'utf8');
            console.log('OK', p.version, 'npmRebuild=false');
          "

      - name: npm install (sans postinstall)
        run: npm install --ignore-scripts

      - name: Créer .env.local depuis les secrets
        env:
          LICENSE_PUBLIC_KEY: ${{ secrets.LICENSE_PUBLIC_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GCAL_CLIENT_ID: ${{ secrets.GCAL_CLIENT_ID }}
          GCAL_CLIENT_SECRET: ${{ secrets.GCAL_CLIENT_SECRET }}
          OWNER_EMAILS: ${{ secrets.OWNER_EMAILS }}
        run: |
          node -e "
            const fs = require('fs');
            const keys = ['LICENSE_PUBLIC_KEY','SUPABASE_URL','SUPABASE_ANON_KEY','GCAL_CLIENT_ID','GCAL_CLIENT_SECRET','OWNER_EMAILS'];
            const lines = keys.map(k => {
              const v = (process.env[k] || '').replace(/\"/g, '\\\\\"').replace(/\r\n/g, '\\\\n').replace(/\n/g, '\\\\n');
              return k + '=\"' + v + '\"';
            });
            fs.writeFileSync('.env.local', lines.join('\n') + '\n');
            console.log('Créé .env.local avec', keys.length, 'variables');
          "

      - name: Compiler better-sqlite3 x64 (CFLAGS + npm_config_arch)
        env:
          CFLAGS: "-arch x86_64"
          CXXFLAGS: "-arch x86_64"
          LDFLAGS: "-arch x86_64"
          ARCHFLAGS: "-arch x86_64"
          npm_config_arch: "x64"
          npm_config_target_arch: "x64"
        run: |
          ELECTRON_VER=$(node -p "require('./node_modules/electron/package.json').version")
          echo "Electron : $ELECTRON_VER"
          npx electron-rebuild --arch x64 --force --only better-sqlite3 --electron-version "$ELECTRON_VER"

      - name: Vérifier architecture x86_64 (BLOQUANT)
        run: |
          NODE_FILE=$(find node_modules/better-sqlite3 -name "*.node" | head -1)
          echo "Binaire : $NODE_FILE"
          file "$NODE_FILE"
          if ! file "$NODE_FILE" | grep -q "x86_64"; then
            echo "ERREUR : binaire non x86_64 — build annulé"
            exit 1
          fi
          echo "✓ x86_64 confirmé"

      - name: Build DMG x64 (npmRebuild=false — conserve notre binaire x64)
        run: npx vite build && npx electron-builder --mac --x64 --publish never

      - name: Garantir suffixe -x64.dmg
        run: |
          cd release
          for f in *.dmg; do
            [[ "$f" == *"-x64.dmg" ]] && echo "OK : $f" && continue
            mv "$f" "${f%.dmg}-x64.dmg"
            echo "Renommé → ${f%.dmg}-x64.dmg"
          done
          ls -lh *.dmg

      - name: Publier sur GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Synoria ${{ github.ref_name }}
          body: |
            ## Synoria ${{ github.ref_name }} — macOS

            | Fichier | Compatible avec |
            |---------|----------------|
            | `*-arm64.dmg` | **Apple Silicon** M1 / M2 / M3 — MacBook depuis fin 2020 |
            | `*-x64.dmg`   | **Intel Core** — MacBook avant fin 2020 |

            > **Comment savoir ?** Pomme  → À propos de ce Mac
            > - "Apple M..." → télécharger **arm64**
            > - "Intel Core..." → télécharger **x64**
          files: release/Synoria*-x64.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
