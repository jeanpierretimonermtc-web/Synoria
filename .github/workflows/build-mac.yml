name: Build Mac

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac-universal:
    name: Build Mac (Universal — Intel + Apple Silicon)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm install

      - name: Configurer package.json cabinet (identifiants stables)
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${VERSION}' || pkg.version;
            pkg.build.appId = 'com.synoria.cabinet';
            pkg.build.productName = 'Synoria';
            if (pkg.build.nsis) {
              pkg.build.nsis.deleteAppDataOnUninstall = false;
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2), 'utf8');
            console.log('OK - package.json v' + pkg.version + ' (com.synoria.cabinet)');
          "

      - name: Build Mac universel
        run: npx vite build && npx electron-builder --mac --universal --publish never

      - name: Lister les fichiers release (debug)
        run: ls -lh release/ || echo "Dossier release vide"

      - name: Renommer le DMG sans espaces
        run: |
          DMG=$(ls release/*.dmg 2>/dev/null | head -1)
          if [ -n "$DMG" ]; then
            DEST="release/Synoria-${{ github.ref_name }}-universal.dmg"
            mv "$DMG" "$DEST"
            echo "DMG renommé : $DEST"
          else
            echo "ERREUR : aucun fichier .dmg trouvé dans release/"
            exit 1
          fi

      - name: Publier vers GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Synoria ${{ github.ref_name }}
          body: |
            ## Synoria ${{ github.ref_name }} — macOS

            **Télécharger :** `Synoria-${{ github.ref_name }}-universal.dmg`

            Compatible **Intel (2019 et avant)** et **Apple Silicon M1/M2/M3** — un seul fichier pour tous les Mac.

            > Premier lancement : clic droit → Ouvrir → Ouvrir quand même (app non signée)
          files: release/Synoria-${{ github.ref_name }}-universal.dmg
          overwrite: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
