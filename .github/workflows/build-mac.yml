name: Build macOS (Synoria)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version à builder (ex: 1.3.1)'
        required: false
        default: '1.3.1'

  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build with Vite
        run: npx vite build

      - name: Build Electron app for macOS (universel Intel + Apple Silicon)
        run: npx electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DMG universel
        uses: actions/upload-artifact@v4
        with:
          name: Synoria-macOS-${{ github.event.inputs.version || '1.3.1' }}
          path: release/*.dmg
          retention-days: 90
          if-no-files-found: error
